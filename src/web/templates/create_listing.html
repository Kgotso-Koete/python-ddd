{% extends "base.html" %}

{% block title %}Create New Listing | Premium Auctions{% endblock %}

{% block head %}
<style>
    .form-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        padding: 2rem 0;
    }
    
    .form-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(16px);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 3rem;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    .form-card h2 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
    }
    
    .form-card p {
        color: var(--text-secondary);
        margin-bottom: 2rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        font-size: 0.95rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: var(--text-secondary);
    }
    
    .form-group input, .form-group textarea {
        width: 100%;
        padding: 0.85rem 1rem;
        background-color: rgba(15, 23, 42, 0.6);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 1rem;
        transition: all 0.2s ease;
        font-family: inherit;
    }
    
    .form-group textarea {
        resize: vertical;
        min-height: 120px;
    }
    
    .form-group input:focus, .form-group textarea:focus {
        outline: none;
        border-color: var(--accent-color);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    
    .btn-full {
        width: 100%;
        padding: 1rem;
        font-size: 1.1rem;
        margin-top: 1rem;
    }
    
    .error-msg {
        color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
        padding: 0.75rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        border: 1px solid rgba(239, 68, 68, 0.2);
        font-size: 0.9rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h2>Create Listing</h2>
        <p>Draft and instantly publish a new item to the auction catalog.</p>
        
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        
        <form action="/ui/catalog/new" method="POST">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="e.g. Vintage Leather Jacket" required>
            </div>
            
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Describe the item's condition, history, and features..." required></textarea>
            </div>
            
            <div class="form-group">
                <label for="ask_price">Starting Ask Price (USD)</label>
                <input type="number" id="ask_price" name="ask_price" min="1" step="1" placeholder="100" required>
            </div>
            
            <button type="submit" class="btn btn-full">Create & Publish Listing</button>
        </form>
    </div>
</div>
{% endblock %}
